# =============================================================================
# @oryxel/job-stream-gateway — Railway (config-as-code)
#
# В UI Railway для этого сервиса:
#   • Root directory: пусто / "."  (корень монорепозитория)
#   • Config file: apps/job-stream-gateway/railway.toml
#
# Образ собирается из корня: Dockerfile копирует весь монорепо и делает bun install,
# иначе npm/railpack в подпапке ломается на workspace:*.
# =============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/job-stream-gateway/Dockerfile"
watchPatterns = [
  "/apps/job-stream-gateway/**",
  "/packages/**",
  "/package.json",
  "/bun.lock",
]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
