# =============================================================================
# @oryxel/job-stream-gateway — Railway (config-as-code)
#
# В UI Railway для этого сервиса:
#   • Root directory: пусто / "."  (корень монорепозитория)
#   • Config file: apps/job-stream-gateway/railway.toml
#
# Как у worker: Railpack + bun install из корня репо — иначе workspace:* не резолвится.
# =============================================================================

[build]
builder = "RAILPACK"
buildCommand = "bun install --frozen-lockfile"
watchPatterns = [
  "/apps/job-stream-gateway/**",
  "/packages/**",
  "/package.json",
  "/bun.lock",
]

[deploy]
startCommand = "bun run --cwd apps/job-stream-gateway start"
healthcheckPath = "/health"
healthcheckTimeout = 30
