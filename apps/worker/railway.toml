# =============================================================================
# @oryxel/worker — Railway (config-as-code)
#
# В UI Railway для этого сервиса:
#   • Root directory: пусто / "."  (корень монорепозитория, НЕ apps/worker)
#   • Config file: apps/worker/railway.toml
#     (Settings → сервис → вкладка с конфигом / “Config as code”)
#
# Установка и старт выполняются из корня репо, чтобы Bun разрешил workspace:*.
# =============================================================================

[build]
builder = "RAILPACK"
buildCommand = "bun install --frozen-lockfile"
watchPatterns = [
  "/apps/worker/**",
  "/packages/**",
  "/package.json",
  "/bun.lock",
]

[deploy]
startCommand = "bun run --cwd apps/worker start"
